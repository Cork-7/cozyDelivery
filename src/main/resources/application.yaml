spring:
  application:
    name: cozyDelivery

  datasource:
    url: jdbc:mysql://localhost:3306/cozyDelivery?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username : ${USER_NAME}
    password : ${USER_PASSWORD}
    driver-class-name : com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always